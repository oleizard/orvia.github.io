name: Aggiornamento Quotidiano Orvia

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  genera_e_pubblica:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup di Python (Versione aggiornata)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installazione libreria Gemini (Nuovo standard)
        run: pip install -q -U google-genai

      - name: Esecuzione script Python
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generatore.py

      - name: Salvataggio e pubblicazione su GitHub Pages
        run: |
          git config --global user.name "Orvia Bot"
          git config --global user.email "bot@orvia.it"
          git add index.html
          git commit -m "Aggiornamento automatico articolo quotidiano" || echo "Nessuna modifica da salvare"
          git push
